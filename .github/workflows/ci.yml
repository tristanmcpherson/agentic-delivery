name: Agentic Delivery CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  portability-and-proof:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/agentic-playwright
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          package-manager-cache: false
      - run: npm ci
      - run: npm test
      - run: npm run portability
      - name: Install Chromium and Linux dependencies
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium
      - name: Install Chromium
        if: runner.os != 'Linux'
        run: npx playwright install chromium
      - run: npm run proof
      - run: npm run evaluate:pilot:current
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mechanical-evidence-${{ matrix.os }}
          if-no-files-found: error
          path: |
            proof/mechanical-report.json
            proof/last-proof.json
            evaluation/results/pilot-latest.json
