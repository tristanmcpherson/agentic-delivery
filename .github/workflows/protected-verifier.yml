name: Protected verifier reference

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Immutable candidate commit SHA
        required: true
        type: string
      task:
        description: Task contract path within the candidate
        required: true
        default: proof/tasks/non-ui-healthy.json
        type: string
      config:
        description: Agentic config path within the candidate
        required: true
        default: proof/config.json
        type: string

permissions:
  contents: read

env:
  AGENTIC_AUTHORITY_MODE: verifier
  AGENTIC_VERIFIER_ID: github-actions-protected-verifier
  AGENTIC_VERIFIER_ISSUER: github-actions-environment
  AGENTIC_VERIFIER_REPOSITORY: ${{ github.repository }}
  AGENTIC_VERIFIER_WORKFLOW_REF: ${{ github.workflow_ref }}@${{ github.workflow_sha }}
  AGENTIC_VERIFIER_PUBLIC_KEY: ${{ vars.AGENTIC_VERIFIER_PUBLIC_KEY }}
  AGENTIC_CANDIDATE_ID: ${{ inputs.candidate_sha }}

jobs:
  prepare-request:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout trusted controller
        uses: actions/checkout@v7
        with:
          ref: ${{ github.workflow_sha }}
          path: controller
          persist-credentials: false
      - name: Checkout immutable candidate
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.candidate_sha }}
          path: candidate
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          package-manager-cache: false
      - name: Create exact verifier grant request with trusted harness
        run: >-
          node controller/plugins/agentic-delivery/scripts/agentic-harness.mjs grant-request
          --root candidate
          --config ${{ inputs.config }}
          --task ${{ inputs.task }}
          --output ../controller-artifacts/verifier-request.json
      - uses: actions/upload-artifact@v7
        with:
          name: verifier-request
          if-no-files-found: error
          path: controller-artifacts/verifier-request.json

  authorize:
    needs: prepare-request
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: agentic-closure
      deployment: false
    steps:
      - name: Checkout trusted controller only
        uses: actions/checkout@v7
        with:
          ref: ${{ github.workflow_sha }}
          path: controller
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          package-manager-cache: false
      - uses: actions/download-artifact@v8
        with:
          name: verifier-request
          path: controller-artifacts
      - name: Sign request in protected environment
        env:
          AGENTIC_VERIFIER_PRIVATE_KEY: ${{ secrets.AGENTIC_VERIFIER_PRIVATE_KEY }}
        run: >-
          node controller/plugins/agentic-delivery/scripts/sign-verifier-grant.mjs
          --request controller-artifacts/verifier-request.json
          --output controller-artifacts/verifier-grant.json
          --expected-candidate ${{ inputs.candidate_sha }}
          --expected-repository ${{ github.repository }}
          --expected-verifier-id github-actions-protected-verifier
          --expected-issuer github-actions-environment
          --expected-workflow-ref ${{ github.workflow_ref }}@${{ github.workflow_sha }}
          --ttl-seconds 900
      - uses: actions/upload-artifact@v7
        with:
          name: verifier-grant
          if-no-files-found: error
          path: controller-artifacts/verifier-grant.json

  verify:
    needs: authorize
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout trusted controller
        uses: actions/checkout@v7
        with:
          ref: ${{ github.workflow_sha }}
          path: controller
          persist-credentials: false
      - name: Checkout immutable candidate
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.candidate_sha }}
          path: candidate
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          package-manager-cache: false
      - uses: actions/download-artifact@v8
        with:
          name: verifier-grant
          path: controller-artifacts
      - name: Install candidate dependencies without controller secret
        working-directory: candidate
        run: npm ci
      - name: Run required checks with trusted harness and signed grant
        run: >-
          node controller/plugins/agentic-delivery/scripts/agentic-harness.mjs run
          --root candidate
          --config ${{ inputs.config }}
          --task ${{ inputs.task }}
          --verifier-grant ../controller-artifacts/verifier-grant.json
      - name: Emit closure status
        run: >-
          node controller/plugins/agentic-delivery/scripts/agentic-harness.mjs status
          --root candidate
          --config ${{ inputs.config }}
          --task ${{ inputs.task }}
          --json > controller-artifacts/closure-status.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: closure-evidence-${{ inputs.candidate_sha }}
          if-no-files-found: error
          include-hidden-files: true
          path: |
            controller-artifacts/closure-status.json
            controller-artifacts/verifier-grant.json
            candidate/proof/evidence/
