interface:
  display_name: "Harness Doctor"
  short_description: "Audit harness and skill health safely"
  default_prompt: "Use $harness-doctor to inventory this harness and skill estate, verify current GPT-5.6 guidance from official docs when available, and return evidence-backed read-only recommendations plus a preview-only pruning plan."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "openaiDeveloperDocs"
      description: "OpenAI developer documentation for current model guidance"
      transport: "streamable_http"
      url: "https://developers.openai.com/mcp"
